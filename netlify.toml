[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

# Scheduled functions: declare here AS WELL as inline `export const config`
# so the build pipeline picks up the schedule regardless of how esbuild
# bundles the function. Without this block the cron silently didn't fire
# (functions:list showed scheduled=yes but Netlify never invoked it).
[functions."gmail-sent-crawl"]
  schedule = "15 * * * *"   # hourly at :15 — pulls each opted-in rep's recent Sent folder

[functions."smartlead-pull"]
  schedule = "25 * * * *"   # hourly at :25 — Smartlead reply/send presence (machine-independent; needs SMARTLEAD_API_KEY in Netlify env)

[functions."gmail-watch-renew"]
  schedule = "0 12 * * *"   # daily noon UTC — re-arms Gmail push notifications before the 7d expiry

[functions."slack-rep-digest"]
  schedule = "0 * * * *"    # hourly — function checks each rep's local tz and only fires at 8am LOCAL

[functions."founder-queue-scheduled"]
  schedule = "45 11 * * 1-5"  # 7:45am ET weekdays — 5 broker notes/day via the v2 writing loop (drafts+Slack cards; Will sends).

[functions."tech-scout-scheduled"]
  schedule = "35 11 * * 1-5"  # 7:35am ET weekdays — tech-exec daily scout (harvest→enrich→verify→queue). Replaces the Mac cron; needs APOLLO/MV/BOUNCEBAN/ANTHROPIC in Netlify env (verified 2026-07-13).

[functions."founder-followup-scheduled"]
  schedule = "0 13,15,17,19 * * 1-5"  # 9am/11am/1pm/3pm ET weekdays — auto-send founder E2/E3/E4 (replaces the Mac cron; E2 now day+2)

[functions."founder-reply-graduate-scheduled"]
  schedule = "35 * * * *"   # hourly :35 — graduate positive replies to Will's personal E1s → on-spine draft

[functions."founder-reply-reconcile-scheduled"]
  schedule = "20 12 * * *"  # daily 8:20am ET — mailbox sweep (incl Trash/Spam) for off-thread founder replies

[functions."cron-heartbeat-monitor"]
  schedule = "0 16 * * *"   # daily noon ET — dead-man's-switch: Slack-alerts Will if any outreach cron went stale

[functions."enrich-replies-scheduled"]
  schedule = "30 10 * * *"  # daily 6:30am ET — classify + suppress replies (machine-independent; runs BEFORE graduate; Sundays also reclassify-all)

[functions."generate-plays-scheduled"]
  schedule = "45 10 * * *"  # daily 6:45am ET — rebuild Play A/B/reconciliation boards (after enrich; machine-independent)

[functions."sync-bounces-scheduled"]
  schedule = "50 10 * * *"  # daily 6:50am ET — suppress Smartlead-blocked/bounced leads (machine-independent)

[functions."graduate-replies-scheduled"]
  schedule = "5 11 * * *"   # daily 7:05am ET — graduate positive cold replies (machine-independent; retires the Mac cron)

[[redirects]]
  from = "/shared/*"
  to = "/index.html"
  status = 200
  force = true
  headers = { Cache-Control = "no-store" }

[[redirects]]
  from = "/proposal/*"
  to = "/index.html"
  status = 200
  force = true
  headers = { Cache-Control = "no-store" }

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true
  headers = { Cache-Control = "no-store" }

[[headers]]
  for = "/*"
    [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = """
      default-src 'self' https://www.facebook.com;
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://maps.googleapis.com https://connect.facebook.net https://www.facebook.com https://snap.licdn.com https://www.googletagmanager.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: https://* http://*;
      media-src 'self' https://*.supabase.co https://cdn.sanity.io;
      connect-src 'self' https://*.supabase.co https://*.supabase.in wss://*.supabase.co wss://*.supabase.in https://maps.googleapis.com https://connect.facebook.net https://www.facebook.com https://www.google-analytics.com https://analytics.google.com;
      worker-src 'self' blob:;
      frame-src 'self' https://www.facebook.com https://connect.facebook.net https://calendar.google.com;
      frame-ancestors 'none';
      form-action 'self' https://www.facebook.com;
      base-uri 'self'
    """
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "X-Requested-With, Content-Type, Authorization"
    Cache-Control = "no-store"

[[headers]]
  for = "/assets/*"
    [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/Holiday Proposal/*"
    [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"