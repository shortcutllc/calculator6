<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Workhuman TV — Shortcut</title>
<style>
  /* Brand tokens (inlined; equivalent to shortcut design system colors_and_type.css) */
  :root {
    --sc-navy: #09364F;
    --sc-deep-navy: #003C5E;
    --sc-coral: #FF5050;
    --sc-white: #FFFFFF;
    --sc-aqua: #9EFAFF;
    --sc-teal: #0098AD;
    --sc-pink: #F7BBFF;
    --sc-yellow: #FEDC64;
    --sc-beige: #F8F1EB;
    --sc-gray-cool: #F1F6F5;
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; background:#000; overflow:hidden; width:100%; height:100%; font-family: 'Outfit', system-ui, sans-serif; }
  #root { width:100vw; height:100vh; }

  /* Stage: letterbox a 1080x1920 portrait canvas */
  .tv-stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #000;
  }
  .tv-screen {
    width: 1080px; height: 1920px;
    position: relative;
    transform-origin: center center;
    overflow: hidden;
    background: var(--sc-navy);
    box-shadow: 0 40px 120px rgba(0,0,0,0.7);
  }

  /* Keyframes used across slides */
  @keyframes logo-icon-scale {
    0%   { transform: scale(0); opacity: 0; }
    60%  { transform: scale(1.15); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes logo-overshoot {
    0%   { transform: translateX(140px) scale(1.1); }
    100% { transform: translateX(120px) scale(1); }
  }
  @keyframes logo-slide-left {
    0%   { transform: translateX(120px) scale(1); }
    100% { transform: translateX(0) scale(1); }
  }
  @keyframes word-mask-up {
    0%   { transform: translateY(100%); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }
  @keyframes tagline-pan-up {
    0%   { opacity: 0; transform: translateY(24px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes tagline-pan-up-soft {
    0%   { opacity: 0; transform: translateY(14px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes wave-hand {
    0%   { transform: rotate(0deg); }
    15%  { transform: rotate(-14deg); }
    30%  { transform: rotate(14deg); }
    45%  { transform: rotate(-8deg); }
    60%  { transform: rotate(6deg); }
    100% { transform: rotate(0deg); }
  }
  @keyframes glide-in-right {
    0%   { transform: translateX(-120%); opacity: 0; }
    60%  { transform: translateX(14px); opacity: 1; }
    100% { transform: translateX(0); opacity: 1; }
  }
  @keyframes float-particle {
    0%   { transform: translate(0,0) scale(1); }
    100% { transform: translate(12px,-18px) scale(1.2); }
  }
  @keyframes scan-sweep {
    0%   { transform: translateX(-120%); }
    100% { transform: translateX(120%); }
  }
  @keyframes fade-scale-in {
    0%   { opacity: 0; transform: scale(0.94); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes qr-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.55); }
    50%      { box-shadow: 0 0 0 32px rgba(255,255,255,0); }
  }
  @keyframes progress-fill {
    from { width: 0%; }
    to   { width: 100%; }
  }

  /* Hint overlay */
  .hint {
    position: fixed; left: 16px; bottom: 16px; z-index: 50;
    background: rgba(0,0,0,0.6); color: #fff;
    padding: 10px 14px; border-radius: 10px;
    font-family: 'Inter', system-ui, sans-serif; font-size: 12px; font-weight: 700;
    letter-spacing: 0.04em; text-transform: uppercase;
    opacity: 0.85; backdrop-filter: blur(8px);
    transition: opacity 0.3s ease;
    pointer-events: none;
  }
  .hint.hidden { opacity: 0; }

  /* Slide counter + progress */
  .hud {
    position: fixed; right: 16px; top: 16px; z-index: 50;
    display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
    pointer-events: none;
  }
  .hud .count {
    background: rgba(0,0,0,0.55); color: #fff;
    padding: 6px 12px; border-radius: 999px;
    font-family: 'Inter', system-ui, sans-serif; font-size: 11px; font-weight: 700;
    letter-spacing: 0.08em;
  }
  .hud .progress {
    width: 160px; height: 3px; background: rgba(255,255,255,0.2);
    border-radius: 2px; overflow: hidden;
  }
  .hud .progress-bar {
    height: 100%; background: var(--sc-coral);
  }

  /* Screenshot mode: show all 16 in a grid */
  body.shot-mode { overflow: auto !important; background: #1a1a1a; }
  body.shot-mode .tv-stage { position: static !important; padding: 40px; display: grid !important;
    grid-template-columns: repeat(4, 1fr); gap: 30px; height: auto !important; }
  body.shot-mode .tv-screen {
    transform: scale(0.28) !important;
    transform-origin: top left !important;
    width: 1080px !important; height: 1920px !important;
    margin: 0 0 calc(-1920px * 0.72) 0 !important;
  }
  body.shot-mode .hint, body.shot-mode .hud { display: none; }
</style>
</head>
<body>
<div id="root"></div>
